name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Only run if the merge commit isn't from the release workflow itself
  check-release:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $VERSION does not exist, will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: local-voice-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: local-voice-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: local-voice-windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install espeak-ng (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y espeak-ng libasound2-dev pkg-config

      - name: Install espeak-ng (macOS)
        if: runner.os == 'macOS'
        run: brew install espeak-ng

      - name: Install espeak-ng (Windows)
        if: runner.os == 'Windows'
        run: choco install espeak-ng -y

      - name: Build
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/release
          tar czf ../../${{ matrix.artifact }}.tar.gz local-voice
          cd ../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target\release\local-voice.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [check-release, build]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.check-release.outputs.version }}" -m "Release ${{ needs.check-release.outputs.version }}"
          git push origin "${{ needs.check-release.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version }}
          generate_release_notes: true
          files: release/*
